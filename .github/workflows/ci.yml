name: TaskFlow CI

on:
  push:
    branches:
      - dev
      - main
      - "feature/*"
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Type check (VERY useful for TS)
      - name: Type check
        run: npx tsc --noEmit

      # 5. Lint (if you have eslint)
      - name: Lint
        run: npm run lint

      # 6. Build project
      - name: Build
        run: npm run build